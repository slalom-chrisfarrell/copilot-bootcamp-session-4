<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slalom Capabilities Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-toolbar">
      <div id="auth-status" class="auth-status">Signed out</div>
      <button id="auth-button" class="auth-button">Practice Lead Login</button>
    </div>

    <header>
      <div class="header-content">
        <img src="https://colby-timm.github.io/images/byte-teacher.png" alt="Byte mascot" class="mascot" />
        <div class="header-text">
          <h1>Slalom Capabilities Management</h1>
          <h2>Consulting Expertise Platform</h2>
        </div>
      </div>
    </header>

    <main>
      <section id="capabilities-container">
        <h3>Available Capabilities</h3>
        <div id="capabilities-list">
          <!-- Capabilities will be loaded here -->
          <p>Loading capabilities...</p>
        </div>
      </section>

      <section id="register-container">
        <h3>Register Your Expertise</h3>
        <form id="register-form">
          <div class="form-group">
            <label for="email">Consultant Email:</label>
            <input type="email" id="email" required placeholder="your-email@slalom.com" />
          </div>
          <div class="form-group">
            <label for="capability">Select Capability:</label>
            <select id="capability" required>
              <option value="">-- Select a capability --</option>
              <!-- Capability options will be loaded here -->
            </select>
          </div>
          <button type="submit">Register Expertise</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <img src="https://colby-timm.github.io/images/byte-celebrate.png" alt="Byte celebrating" class="footer-mascot" />
        <p>&copy; 2025 Slalom • Building Better Tomorrow</p>
      </div>
    </footer>

    <div id="auth-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <div class="modal-content">
        <h3 id="auth-modal-title">Practice Lead Sign In</h3>
        <form id="auth-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required placeholder="practice.lead" />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Password" />
          </div>
          <div class="modal-actions">
            <button type="submit">Sign In</button>
            <button type="button" id="auth-cancel" class="secondary-button">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
